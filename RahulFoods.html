    @keyframes pageFadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .menu-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:28px; max-width:1100px; margin:0 auto; }

    @media(max-width:580px){ .menu-grid{ grid-template-columns:1fr; } }

    /* Dish card */
    .dish-card { background:#fff; border-radius:6px; overflow:hidden; box-shadow:0 2px 20px rgba(0,0,0,0.07); transition:transform 0.3s,box-shadow 0.3s; animation:cardIn 0.5s ease both; display:flex; flex-direction:column; }
    .dish-card:hover { transform:translateY(-5px); box-shadow:0 12px 36px rgba(0,0,0,0.12); }
    .dish-card-img-wrap { position:relative; overflow:hidden; cursor:pointer; }
    .dish-card img { width:100%; height:200px; object-fit:cover; display:block; background:#eee; flex-shrink:0; transition:transform 0.4s ease; }
    .dish-card-img-wrap:hover img { transform:scale(1.05); }
    .dish-card-img-overlay { position:absolute; inset:0; background:rgba(0,0,0,0); display:flex; align-items:center; justify-content:center; transition:background 0.3s; }
    .dish-card-img-wrap:hover .dish-card-img-overlay { background:rgba(0,0,0,0.25); }
    .dish-card-img-overlay span { color:#fff; font-family:sans-serif; font-size:11px; letter-spacing:2px; font-weight:700; text-transform:uppercase; opacity:0; transition:opacity 0.3s; }
    .dish-card-img-wrap:hover .dish-card-img-overlay span { opacity:1; }
    .dish-card-body { padding:16px 18px 18px; display:flex; flex-direction:column; flex:1; }
    .dish-card-name { font-size:15px; color:#1a1a2e; margin-bottom:4px; cursor:pointer; }
    .dish-card-name:hover { color:#c8a96e; }
    .dish-card-stars { display:flex; align-items:center; gap:5px; margin-bottom:6px; }
    .dish-card-desc { color:#bbb; font-size:11px; font-family:sans-serif; font-style:italic; line-height:1.6; flex:1; }
    .dish-tag { font-size:9px; letter-spacing:2px; color:#fff; background:#c8a96e; padding:3px 9px; font-family:sans-serif; font-weight:700; text-transform:uppercase; display:inline-block; margin-bottom:7px; border-radius:2px; }
    .dish-card-footer { border-top:1px solid #f0ece4; margin-top:14px; padding-top:12px; }
    .dish-card-price-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .dish-card-price { font-size:20px; color:#c8a96e; font-family:sans-serif; font-weight:700; }
    .dish-card-btn-row { display:flex; align-items:center; gap:8px; }
    .add-btn { flex:1; padding:9px 0; background:#1a1a2e; color:#fff; border:none; font-size:11px; letter-spacing:1.5px; font-family:sans-serif; font-weight:700; text-transform:uppercase; border-radius:3px; transition:background 0.2s; }
    .add-btn:hover { background:#c8a96e !important; opacity:1 !important; }
    .qty-control { display:flex; align-items:center; flex:1; background:#f9f8f5; border-radius:3px; overflow:hidden; border:1px solid #e8e2d8; }
    .qty-btn { width:36px; height:36px; border:none; background:transparent; color:#1a1a2e; font-size:20px; font-weight:700; display:flex; align-items:center; justify-content:center; transition:background 0.15s; flex-shrink:0; }
    .qty-btn:hover { background:#c8a96e !important; color:#fff !important; opacity:1 !important; }
    .qty-num { flex:1; text-align:center; font-size:14px; font-family:sans-serif; font-weight:700; color:#1a1a2e; }
    .del-btn { width:36px; height:36px; border-radius:3px; border:1px solid #e8e2d8; background:#fff5f5; color:#e05555; font-size:15px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
    .del-btn:hover { background:#e05555 !important; color:#fff !important; border-color:#e05555 !important; opacity:1 !important; }
    .del-btn-full { padding:8px 14px; border:1px solid #e05555; background:transparent; color:#e05555; font-size:11px; letter-spacing:1px; font-family:sans-serif; font-weight:700; border-radius:3px; transition:all 0.2s; }

    .cart-badge { position:absolute; top:-6px; right:-8px; background:#c8a96e; color:#fff; font-size:9px; font-family:sans-serif; font-weight:700; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; animation:badgePop 0.3s ease; }

    .pay-radio-dot { width:8px; height:8px; border-radius:50%; background:#c8a96e; }
    .pay-icon { font-size:24px; width:36px; text-align:center; flex-shrink:0; }
    .pay-label { font-family:sans-serif; }
    .pay-label-title { font-size:13px; font-weight:700; color:#1a1a2e; }

    /* Toast */
    .toast { position:fixed; top:90px; right:24px; z-index:600; padding:13px 18px; border-radius:6px; font-family:sans-serif; font-size:13px; font-weight:600; box-shadow:0 4px 24px rgba(0,0,0,0.18); animation:toastIn 0.3s ease; display:flex; align-items:center; gap:10px; min-width:240px; max-width:340px; }

    .toast-info    { background:#0f1e2e; color:#80b8f0; border:1px solid #2d4d6a; }

    /* Dish Modal */

    .track-dot.active  { background:#fff; border:2px solid #c8a96e; color:#c8a96e; animation: none; }
    .track-dot.pending { background:#f0ece4; color:#ccc; }

    .track-title { font-size:14px; font-weight:700; color:#1a1a2e; margin-bottom:3px; }
    .track-title.active { color:#c8a96e; }
    .track-title.pending { color:#bbb; }

    .faq-item { border-bottom:1px solid #f0ece4; }
    .faq-question { width:100%; text-align:left; padding:20px 4px; background:none; border:none; display:flex; justify-content:space-between; align-items:center; font-family:sans-serif; font-size:14px; font-weight:700; color:#1a1a2e; }
    .faq-answer { padding:0 4px 20px; color:#888; font-family:sans-serif; font-size:13px; line-height:1.9; }
    .faq-icon { color:#c8a96e; font-size:18px; transition:transform 0.25s; flex-shrink:0; }
    .faq-icon.open { transform:rotate(45deg); }

    /* Skeleton loader */
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .img-skeleton { position:absolute; inset:0; background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size:800px 100%; animation:shimmer 1.4s infinite linear; }

    /* Newsletter */
    .newsletter-input { padding:12px 16px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:#fff; font-family:sans-serif; font-size:13px; border-radius:4px 0 0 4px; flex:1; min-width:0; }
    .newsletter-input::placeholder { color:rgba(255,255,255,0.35); }
    .newsletter-btn { padding:12px 22px; background:#c8a96e; color:#fff; border:none; font-family:sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; border-radius:0 4px 4px 0; }

    /* Sticky mobile reserve bar */
    .sticky-reserve { display:none; }
    @media(max-width:700px){
      .sticky-reserve { display:flex; position:fixed; bottom:0; left:0; right:0; z-index:340; background:#1a1a2e; padding:14px 20px; align-items:center; justify-content:space-between; box-shadow:0 -4px 20px rgba(0,0,0,0.25); }
    }

    /* Navbar responsive */
    .navbar-links { display:flex; gap:20px; align-items:center; }
    .navbar-burger { display:none; }
    .navbar-mobile-menu { display:none; }
    @media(max-width:900px) {
      .navbar-links { display:none; }
      .navbar-burger { display:flex; }
      .navbar-mobile-menu.open { display:flex; }
    }

    /* Stars */
    .stars { color:#f5b400; font-size:11px; letter-spacing:0.5px; }
    .stars-count { font-size:11px; color:#aaa; font-family:sans-serif; }
  </style>
</head>

  /* ── STARS ── */
  function Stars({rating, reviews}) {

    return (
      <div className="dish-card-stars">
        <span className="stars">
          {"★".repeat(full)}{half?"½":""}{"☆".repeat(5-full-(half?1:0))}

        <span className="stars-count">{rating} · {reviews} reviews</span>
      </div>
    );
  }

  /* ── TOAST ── */
  function Toast({toast}) {
    if(!toast) return null;
    const cls = toast.type==="error" ? "toast toast-error" : toast.type==="info" ? "toast toast-info" : "toast toast-success";
    const icon = toast.type==="error" ? "❌" : toast.type==="info" ? "ℹ️" : "✅";

  /* ── THREE.JS ── */
  function ThreeCanvas() {
    const ref = useRef(null);
    useEffect(() => {
      const canvas = ref.current; if(!canvas) return;
      const w=canvas.offsetWidth||800, h=canvas.offsetHeight||600;
      const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
      renderer.setSize(w,h); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2)); renderer.setClearColor(0x000000,0);
      const scene=new THREE.Scene(), camera=new THREE.PerspectiveCamera(55,w/h,0.1,100);
      camera.position.set(0,0,6);
      scene.add(new THREE.AmbientLight(0xffffff,0.4));
      const gL=new THREE.PointLight(0xc8a96e,3,25); gL.position.set(4,4,4); scene.add(gL);
      const bL=new THREE.PointLight(0x6ab0f5,1.5,20); bL.position.set(-4,-3,2); scene.add(bL);
      const ico=new THREE.Mesh(new THREE.IcosahedronGeometry(1.6,1),new THREE.MeshPhongMaterial({color:0x12122a,specular:0xd4aa6e,shininess:200,transparent:true,opacity:0.9})); scene.add(ico);
      const wire=new THREE.Mesh(new THREE.IcosahedronGeometry(1.65,1),new THREE.MeshBasicMaterial({color:0xc8a96e,wireframe:true,transparent:true,opacity:0.2})); scene.add(wire);
      const t1=new THREE.Mesh(new THREE.TorusGeometry(2.6,0.015,8,120),new THREE.MeshBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.35})); t1.rotation.x=Math.PI/4; scene.add(t1);
      const t2=new THREE.Mesh(new THREE.TorusGeometry(3.1,0.01,8,120),new THREE.MeshBasicMaterial({color:0x6ab0f5,transparent:true,opacity:0.2})); t2.rotation.x=-Math.PI/6; t2.rotation.z=Math.PI/5; scene.add(t2);
      const og=new THREE.Group(); og.rotation.x=Math.PI/6; scene.add(og);
      const os=[0xc8a96e,0x6ab0f5,0xffffff,0xc8a96e].map((c,i)=>{ const a=(i/4)*Math.PI*2,m=new THREE.Mesh(new THREE.SphereGeometry(0.08,12,12),new THREE.MeshPhongMaterial({color:c,emissive:c,emissiveIntensity:0.4})); m.position.set(Math.cos(a)*2.2,Math.sin(a)*2.2,0); og.add(m); return {m,a,s:0.003+i*0.001}; });
      const pp=new Float32Array(900); for(let i=0;i<900;i++) pp[i]=(Math.random()-0.5)*14;
      const pg=new THREE.BufferGeometry(); pg.setAttribute("position",new THREE.BufferAttribute(pp,3));
      const pts=new THREE.Points(pg,new THREE.PointsMaterial({color:0xc8a96e,size:0.035,transparent:true,opacity:0.55})); scene.add(pts);
      let t=0,id;
      const anim=()=>{ id=requestAnimationFrame(anim); t+=0.005; ico.rotation.x=t*0.4; ico.rotation.y=t*0.6; wire.rotation.x=t*0.4; wire.rotation.y=t*0.6; t1.rotation.z=t*0.3; t2.rotation.y=t*0.2; os.forEach(s=>{s.a+=s.s;s.m.position.x=Math.cos(s.a)*2.2;s.m.position.y=Math.sin(s.a)*2.2;}); pts.rotation.y=t*0.05; pts.rotation.x=t*0.02; gL.position.x=Math.sin(t*0.7)*5; gL.position.y=Math.cos(t*0.5)*5; renderer.render(scene,camera); };
      anim();
      const onR=()=>{const nw=canvas.offsetWidth,nh=canvas.offsetHeight;renderer.setSize(nw,nh);camera.aspect=nw/nh;camera.updateProjectionMatrix();};
      window.addEventListener("resize",onR);
      return ()=>{cancelAnimationFrame(id);window.removeEventListener("resize",onR);renderer.dispose();};
    },[]);
    return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",display:"block"}} />;
  }

  /* ── AUTH MODAL ── */
  function AuthModal({mode, setMode, onClose, onAuth}) {
    const [form,setForm]=useState({name:"",email:"",password:""});
    const [errors,setErrors]=useState({});
    const [loading,setLoading]=useState(false);
    const upd = k => e => setForm(f=>({...f,[k]:e.target.value}));
    const iS = field => ({width:"100%",padding:"12px 14px",border:`1px solid ${errors[field]?"#e05555":"#e0d9ce"}`,background:"#fff",fontFamily:"sans-serif",fontSize:"13px",color:MID,borderRadius:"3px"});
    const lS = {display:"block",fontSize:"10px",letterSpacing:"2px",color:"#999",fontFamily:"sans-serif",fontWeight:"700",textTransform:"uppercase",marginBottom:"6px"};

    useEffect(()=>{
      const fn = e => { if(e.key==="Escape") onClose(); };
      window.addEventListener("keydown", fn);
      return ()=>window.removeEventListener("keydown",fn);
    },[]);

    const validate = () => {
      const e={};
      if(mode==="signup" && !form.name.trim()) e.name="Required";
      if(!form.email.trim()) e.email="Required";
      else if(!/^\S+@\S+\.\S+$/.test(form.email)) e.email="Enter a valid email";
      if(!form.password.trim()) e.password="Required";
      else if(form.password.length<6) e.password="At least 6 characters";
      setErrors(e);
      return Object.keys(e).length===0;
    };

    const submit = async () => {
      if(!validate()) return;
      setLoading(true);
      const email = form.email.trim();
      const password = form.password;
      let result;
      if(mode==="signup") {
        result = await supabase.auth.signUp({
          email, password,
          options: { data: { name: form.name.trim() } }
        });
      } else {
        result = await supabase.auth.signInWithPassword({ email, password });
      }
      setLoading(false);
      if(result.error) {
        setErrors({form: result.error.message});
        return;
      }
      if(mode==="signup" && !result.data.session) {
        setErrors({form: "Account created! Please check your email to confirm, then sign in."});
        return;
      }
      onAuth();
    };

    return (
      <div className="modal-overlay" onClick={onClose}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"8px",maxWidth:"400px",width:"100%",padding:"40px 36px",boxShadow:"0 24px 80px rgba(0,0,0,0.4)",position:"relative"}}>
          <button className="modal-close" style={{position:"absolute",top:"14px",right:"14px",background:"rgba(0,0,0,0.06)",color:"#888"}} onClick={onClose} aria-label="Close dialog">✕</button>
          <p style={{color:GOLD,letterSpacing:"5px",fontSize:"11px",fontFamily:"sans-serif",fontWeight:"600",marginBottom:"10px",textAlign:"center"}}>✦ RAHUL FOODS ✦</p>
          <h2 style={{fontSize:"24px",fontWeight:"300",color:MID,marginBottom:"24px",textAlign:"center"}}>{mode==="signin" ? "Sign In" : "Create Account"}</h2>

          {mode==="signup" && (
            <div style={{marginBottom:"16px"}}>
              <label style={lS}>Full Name *</label>
              <input value={form.name} onChange={upd("name")} placeholder="Your full name" style={iS("name")} />
              {errors.name && <span style={{color:"#e05555",fontSize:"11px",fontFamily:"sans-serif"}}>{errors.name}</span>}
            </div>
          )}
          <div style={{marginBottom:"16px"}}>
            <label style={lS}>Email *</label>
            <input type="email" value={form.email} onChange={upd("email")} placeholder="your@email.com" style={iS("email")} />
            {errors.email && <span style={{color:"#e05555",fontSize:"11px",fontFamily:"sans-serif"}}>{errors.email}</span>}
          </div>
          <div style={{marginBottom:"24px"}}>
            <label style={lS}>Password *</label>
            <input type="password" value={form.password} onChange={upd("password")} placeholder="••••••••" style={iS("password")} onKeyDown={e=>e.key==="Enter"&&submit()} />
            {errors.password && <span style={{color:"#e05555",fontSize:"11px",fontFamily:"sans-serif"}}>{errors.password}</span>}
          </div>

          {errors.form && <p style={{color:"#e05555",fontSize:"12px",fontFamily:"sans-serif",marginBottom:"14px",textAlign:"center"}}>{errors.form}</p>}

          <button onClick={submit} disabled={loading} style={{width:"100%",padding:"14px",background:GOLD,color:"#fff",border:"none",letterSpacing:"3px",fontSize:"11px",fontFamily:"sans-serif",fontWeight:"700",textTransform:"uppercase",borderRadius:"3px",marginBottom:"16px",opacity:loading?0.6:1}}>
            {loading ? "Please wait…" : mode==="signin" ? "Sign In" : "Create Account"}
          </button>

          <p style={{textAlign:"center",fontFamily:"sans-serif",fontSize:"12px",color:"#888"}}>
            {mode==="signin" ? "Don't have an account? " : "Already have an account? "}
            <button onClick={()=>{setErrors({});setMode(mode==="signin"?"signup":"signin");}} style={{background:"none",border:"none",color:GOLD,fontWeight:"700",fontSize:"12px",fontFamily:"sans-serif",textDecoration:"underline"}}>
              {mode==="signin" ? "Sign Up" : "Sign In"}
            </button>
          </p>
        </div>
      </div>
    );
  }

  /* ── ORDER TRACKING ── */
  function OrderTracking({form, total, payLabel, setPage, clearCart}) {
    const [stage, setStage] = useState(0);
    const stages = [
      { icon:"✅", title:"Order Placed",        sub:"We've received your order",        done:true  },
      { icon:"🍳", title:"Being Prepared",       sub:"Our chefs are cooking your meal",  done:false },
      { icon:"🛵", title:"Out for Delivery",     sub:"On the way to your address",       done:false },
      { icon:"🏠", title:"Delivered!",           sub:"Enjoy your meal — bon appétit!",   done:false },
    ];
    useEffect(()=>{
      if(stage < 3) {
        const t = setTimeout(()=>setStage(s=>s+1), stage===0?4000:stage===1?7000:10000);
        return ()=>clearTimeout(t);
      }
    },[stage]);
    return (
      <div style={{paddingTop:"80px",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <PageBanner tag="ORDER PLACED" title="Tracking Your Order" />
        <div style={{flex:1,background:"#f9f8f5",padding:"60px"}}>
          <div style={{maxWidth:"680px",margin:"0 auto"}}>
            {/* Greeting */}
            <div style={{background:"#fff",borderRadius:"6px",padding:"28px 32px",boxShadow:"0 2px 16px rgba(0,0,0,0.05)",marginBottom:"24px",textAlign:"center"}}>
              <div style={{fontSize:"52px",marginBottom:"12px"}}>🎉</div>
              <h2 style={{fontSize:"26px",fontWeight:"300",color:MID,marginBottom:"8px"}}>Order Confirmed, {form.name}!</h2>
              <p style={{fontFamily:"sans-serif",fontSize:"14px",color:"#888",lineHeight:1.8,marginBottom:"6px"}}>Delivering to: <strong style={{color:MID}}>{form.address}, {form.city} – {form.pincode}</strong></p>
              <div style={{display:"inline-flex",alignItems:"center",gap:"8px",background:"#f0faf0",border:"1px solid #aadcaa",borderRadius:"6px",padding:"8px 18px",margin:"10px 0"}}>
                <span style={{fontSize:"15px"}}>✅</span><span style={{fontFamily:"sans-serif",fontSize:"13px",color:"#3a7a3a",fontWeight:"600"}}>Payment via {payLabel}</span>
              </div>
              <div style={{fontSize:"22px",fontWeight:"700",color:GOLD,fontFamily:"sans-serif",marginTop:"6px"}}>Total: ${total.toFixed(2)}</div>
            </div>

            {/* Tracking timeline */}
            <div style={{background:"#fff",borderRadius:"6px",padding:"32px 36px",boxShadow:"0 2px 16px rgba(0,0,0,0.05)",marginBottom:"24px"}}>
              <h3 style={{fontSize:"15px",fontWeight:"700",color:MID,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"sans-serif",marginBottom:"28px"}}>Live Tracking</h3>
              {stages.map((s,i)=>{
                const isDone    = i < stage;
                const isActive  = i === stage;
                const isPending = i > stage;
                return (
                  <div key={i} className="track-step">
                    <div className="track-line-wrap">
                      <div className={`track-dot ${isDone?"done":isActive?"active":"pending"}`}>{isDone?"✓":s.icon}</div>
                      {i < stages.length-1 && <div className={`track-connector${isDone?" done":""}`} />}
                    </div>
                    <div className="track-info">
                      <div className={`track-title ${isDone?"":isActive?"active":"pending"}`}>{s.title}</div>
                      <div className="track-sub">{isActive?"In progress…":isDone?"Done ✓":s.sub}</div>
                    </div>
                  </div>
                );
              })}
              {stage < 3
                ? <p style={{fontFamily:"sans-serif",fontSize:"12px",color:"#aaa",marginTop:"8px"}}>🛵 Estimated delivery: 30–45 minutes</p>
                : <p style={{fontFamily:"sans-serif",fontSize:"13px",color:"#3a7a3a",fontWeight:"600",marginTop:"8px"}}>🏠 Your order has been delivered! Enjoy!</p>
              }
            </div>

            <div style={{display:"flex",gap:"14px"}}>
              <button onClick={()=>window.print()} style={{flex:1,padding:"14px",background:"transparent",border:"1px solid #ccc",color:"#888",letterSpacing:"2px",fontSize:"11px",fontFamily:"sans-serif",fontWeight:"700",textTransform:"uppercase",borderRadius:"3px"}}>🖨 Print Receipt</button>
              <button onClick={()=>{clearCart();setPage("menu");}} style={{flex:1,padding:"14px",background:"transparent",border:`1px solid ${GOLD}`,color:GOLD,letterSpacing:"2px",fontSize:"11px",fontFamily:"sans-serif",fontWeight:"700",textTransform:"uppercase",borderRadius:"3px"}}>Order Again</button>
              <button onClick={()=>{clearCart();setPage("home");}} style={{flex:1,padding:"14px",background:GOLD,color:"#fff",border:"none",letterSpacing:"2px",fontSize:"11px",fontFamily:"sans-serif",fontWeight:"700",textTransform:"uppercase",borderRadius:"3px"}}>Back to Home</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ── CART PAGE with PROMO CODE ── */
  function CartPage({cart, updateQty, setPage, showToast, clearCart, onOrderPlaced}) {
    const cartItems = Object.values(cart);
    const subtotal  = cartItems.reduce((s,{item,qty})=>s+getPrice(item)*qty, 0);

    const [form,     setForm]     = useState({name:"",phone:"",address:"",city:"",pincode:"",instructions:""});
    const [errors,   setErrors]   = useState({});
    const [payMethod,setPayMethod]= useState("cod");
    const [payForm,  setPayForm]  = useState({});
    const [payErrors,setPayErrors]= useState({});
    const [ordered,  setOrdered]  = useState(false);
    const [promoInput, setPromoInput] = useState("");
    const [promo,      setPromo]      = useState(null);
    const [promoErr,   setPromoErr]   = useState("");

    const applyPromo = () => {
      const code = promoInput.trim().toUpperCase();
      if(PROMO_CODES[code]) {
        setPromo({code, ...PROMO_CODES[code]});
        setPromoErr("");
        showToast(`${PROMO_CODES[code].label} applied! 🎉`, "success");
      } else {
        setPromoErr("Invalid promo code. Try RAHUL10, WELCOME20, FREESHIP or FEAST50.");
        setPromo(null);
      }
    };

    const discount = promo
      ? promo.type==="percent" ? (subtotal * promo.value / 100)
      : promo.type==="flat"    ? Math.min(promo.value, subtotal)
      : DELIVERY_FEE
      : 0;
    const delivery   = promo?.type==="freeship" ? 0 : DELIVERY_FEE;
    const total      = subtotal - (promo?.type==="flat"||promo?.type==="percent" ? discount : 0) + delivery;

    const upd = k => e => setForm(f=>({...f,[k]:e.target.value}));
    const validate = () => {
      const e={};
      if(!form.name.trim())    e.name="Required";
      if(!form.phone.trim())   e.phone="Required";
      if(!form.address.trim()) e.address="Required";
      if(!form.city.trim())    e.city="Required";
      if(!form.pincode.trim()) e.pincode="Required";
      setErrors(e);
      const pe={};
      if(payMethod==="card"){
        if(!(payForm.cardNum||"").replace(/\s/g,"").match(/^\d{16}$/)) pe.cardNum="Enter valid 16-digit number";
        if(!(payForm.cardName||"").trim()) pe.cardName="Required";
        if(!(payForm.expiry||"").match(/^\d{2}\s\/\s\d{2}$/)) pe.expiry="MM / YY";
        if(!(payForm.cvv||"").match(/^\d{3,4}$/)) pe.cvv="3-4 digits";
      }
      if(payMethod==="upi" && !(payForm.upiId||"").includes("@")) pe.upiId="Enter valid UPI ID";
      if(payMethod==="nb"  && !(payForm.bank||"")) pe.bank="Please select a bank";
      if(payMethod==="wallet" && !(payForm.wallet||"")) pe.wallet="Please select a wallet";
      setPayErrors(pe);
      return Object.keys(e).length===0 && Object.keys(pe).length===0;
    };

    const iStyle = field => ({width:"100%",padding:"13px 15px",border:`1px solid ${errors[field]?"#e05555":"#e0d9ce"}`,background:"#fff",fontFamily:"sans-serif",fontSize:"14px",color:MID,borderRadius:"3px"});
    const lStyle = {display:"block",fontSize:"10px",letterSpacing:"2px",color:"#999",fontFamily:"sans-serif",fontWeight:"700",textTransform:"uppercase",marginBottom:"7px"};
    const payLabel = {cod:"Cash on Delivery",card:"Credit / Debit Card",upi:"UPI Payment",nb:"Net Banking",wallet:"Mobile Wallet"}[payMethod];

    if(ordered) return <OrderTracking form={form} total={total} payLabel={payLabel} setPage={setPage} clearCart={clearCart} />;

    if(cartItems.length===0) return (
      <div style={{paddingTop:"80px",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <PageBanner tag="YOUR ORDER" title="Cart" />
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"80px",background:"#f9f8f5",flexDirection:"column",gap:"24px"}}>
          <div style={{fontSize:"64px"}}>🛒</div>
          <h2 style={{fontSize:"28px",fontWeight:"300",color:MID}}>Your cart is empty</h2>
          <p style={{color:"#aaa",fontFamily:"sans-serif",fontSize:"14px"}}>Add some delicious dishes from our menu!</p>
          <button onClick={()=>setPage("menu")} style={{padding:"14px 44px",background:GOLD,color:"#fff",border:"none",letterSpacing:"3px",fontSize:"11px",fontFamily:"sans-serif",fontWeight:"700",textTransform:"uppercase"}}>Browse Menu</button>
        </div>
      </div>
    );

    return (
      <div style={{paddingTop:"80px",minHeight:"100vh"}}>
        <PageBanner tag="YOUR ORDER" title="Cart & Checkout" />
        <div style={{background:"#f9f8f5",padding:"60px"}}>
          <div style={{maxWidth:"1100px",margin:"0 auto",display:"grid",gridTemplateColumns:"1fr 420px",gap:"40px",alignItems:"start"}}>
            <div>
              {/* Cart items */}
              <div style={{background:"#fff",borderRadius:"6px",padding:"28px 32px",boxShadow:"0 2px 16px rgba(0,0,0,0.05)",marginBottom:"24px"}}>
                <h3 style={{fontSize:"18px",fontWeight:"normal",marginBottom:"4px",color:MID}}>Your Items</h3>
                <p style={{color:"#aaa",fontFamily:"sans-serif",fontSize:"12px",marginBottom:"20px"}}>{cartItems.length} item{cartItems.length!==1?"s":""} selected</p>
                {cartItems.map(({item,qty})=>(
                  <div key={item.name} className="cart-item">
                    <img src={item.img} alt={item.name} onError={e=>e.target.src=FALLBACK} />
                    <div style={{flex:1}}>
                      <div style={{fontSize:"15px",color:MID,marginBottom:"4px"}}>{item.name}</div>
                      <Stars rating={item.rating} reviews={item.reviews} />
                      <div style={{display:"flex",alignItems:"center",gap:"10px",marginTop:"8px"}}>
                        <div className="qty-control" style={{maxWidth:"110px"}}>
                          <button className="qty-btn" onClick={()=>updateQty(item.name,-1)}>−</button>
                          <span className="qty-num">{qty}</span>
                          <button className="qty-btn" onClick={()=>updateQty(item.name,1)}>+</button>
                        </div>
                        <span style={{color:"#ccc",fontSize:"12px",fontFamily:"sans-serif"}}>× {item.price}</span>
                      </div>
                    </div>
                    <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"10px"}}>
                      <div style={{fontSize:"18px",color:GOLD,fontFamily:"sans-serif",fontWeight:"700"}}>${(getPrice(item)*qty).toFixed(2)}</div>
                      <button className="del-btn-full" onClick={()=>updateQty(item.name,-qty)}>🗑 Delete</button>
                    </div>
                  </div>
                ))}
                <div style={{display:"flex",gap:"10px",marginTop:"16px",flexWrap:"wrap"}}>
                  <button onClick={()=>setPage("menu")} style={{background:"none",border:`1px solid ${GOLD}`,color:GOLD,padding:"9px 18px",fontSize:"11px",fontFamily:"sans-serif",fontWeight:"700",letterSpacing:"2px",textTransform:"uppercase",borderRadius:"3px"}}>← Back to Menu</button>
                  <button onClick={()=>{ if(window.confirm("Cancel your entire order? All items will be removed from the cart.")) { clearCart(); setPage("menu"); } }} style={{background:"none",border:"1px solid #e05555",color:"#e05555",padding:"9px 18px",fontSize:"11px",fontFamily:"sans-serif",fontWeight:"700",letterSpacing:"2px",textTransform:"uppercase",borderRadius:"3px"}}>🗑 Cancel Order</button>
                </div>
              </div>

              {/* Delivery details */}
              <div style={{background:"#fff",borderRadius:"6px",padding:"28px 32px",boxShadow:"0 2px 16px rgba(0,0,0,0.05)",marginBottom:"24px"}}>
                <h3 style={{fontSize:"18px",fontWeight:"normal",marginBottom:"4px",color:MID}}>Delivery Details</h3>
                <p style={{color:"#aaa",fontFamily:"sans-serif",fontSize:"12px",marginBottom:"22px"}}>Where should we deliver your order?</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px",marginBottom:"18px"}}>
                  <div><label style={lStyle}>Full Name *</label><input value={form.name} onChange={upd("name")} placeholder="Your full name" style={iStyle("name")} />{errors.name&&<span style={{color:"#e05555",fontSize:"11px",fontFamily:"sans-serif"}}>{errors.name}</span>}</div>
                  <div><label style={lStyle}>Phone *</label><input type="tel" value={form.phone} onChange={upd("phone")} placeholder="+91 00000 00000" style={iStyle("phone")} />{errors.phone&&<span style={{color:"#e05555",fontSize:"11px",fontFamily:"sans-serif"}}>{errors.phone}</span>}</div>
                </div>
                <div style={{marginBottom:"18px"}}>
                  <label style={lStyle}>Full Address *</label>
                  <textarea value={form.address} onChange={upd("address")} rows={3} placeholder="House/flat no., building name, street, area..." style={{...iStyle("address"),resize:"vertical",lineHeight:1.7}} />
                  {errors.address&&<span style={{color:"#e05555",fontSize:"11px",fontFamily:"sans-serif"}}>{errors.address}</span>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px",marginBottom:"18px"}}>
                  <div><label style={lStyle}>City *</label><input value={form.city} onChange={upd("city")} placeholder="e.g. Mumbai" style={iStyle("city")} />{errors.city&&<span style={{color:"#e05555",fontSize:"11px",fontFamily:"sans-serif"}}>{errors.city}</span>}</div>
                  <div><label style={lStyle}>Pincode *</label><input type="number" value={form.pincode} onChange={upd("pincode")} placeholder="e.g. 400001" style={iStyle("pincode")} />{errors.pincode&&<span style={{color:"#e05555",fontSize:"11px",fontFamily:"sans-serif"}}>{errors.pincode}</span>}</div>
                </div>
                {form.pincode && form.pincode.length>=5 && (
                  <div style={{display:"flex",alignItems:"center",gap:"10px",background:"#fdf9f2",border:`1px solid ${GOLD}44`,borderRadius:"4px",padding:"10px 14px",marginBottom:"18px"}}>
                    <span style={{fontSize:"18px"}}>🛵</span>
                    <span style={{fontFamily:"sans-serif",fontSize:"12px",color:"#666"}}>
                      Estimated delivery to <strong style={{color:MID}}>{form.pincode}</strong>: <strong style={{color:GOLD}}>{25 + (parseInt(form.pincode.slice(-2))||0) % 25}–{40 + (parseInt(form.pincode.slice(-2))||0) % 25} minutes</strong>
                    </span>
                  </div>
                )}
                <div><label style={lStyle}>Delivery Instructions (optional)</label><textarea value={form.instructions} onChange={upd("instructions")} rows={2} placeholder="Landmark, floor number, gate code, etc..." style={{...iStyle("instructions"),resize:"vertical",lineHeight:1.7}} /></div>
              </div>

              {/* Payment */}
              <PaymentSection payMethod={payMethod} setPayMethod={setPayMethod} payForm={payForm} setPayForm={setPayForm} payErrors={payErrors} />
            </div>

            {/* RIGHT — summary */}
            <div style={{position:"sticky",top:"100px"}}>
              <div className="summary-box">
                <h3 style={{fontSize:"18px",fontWeight:"normal",marginBottom:"20px",color:MID,paddingBottom:"16px",borderBottom:"1px solid #f0ece4"}}>Order Summary</h3>
                {cartItems.map(({item,qty})=>(
                  <div key={item.name} className="summary-row">
                    <span style={{fontSize:"13px"}}>{item.name} × {qty}</span>
                    <span style={{color:MID,fontWeight:"600"}}>${(getPrice(item)*qty).toFixed(2)}</span>
                  </div>
                ))}

                {/* Promo code */}
                <div style={{borderTop:"1px solid #f0ece4",marginTop:"8px",paddingTop:"14px",marginBottom:"4px"}}>

                    <input value={promoInput} onChange={e=>setPromoInput(e.target.value.toUpperCase())}
                      placeholder="Promo code" maxLength={12}
                      style={{flex:1,padding:"10px 12px",border:"1px solid #e0d9ce",borderRadius:"3px",fontFamily:"sans-serif",fontSize:"12px",color:MID,textTransform:"uppercase",letterSpacing:"1px"}}
                      onKeyDown={e=>e.key==="Enter"&&applyPromo()} />

                  {promoErr && <p style={{fontFamily:"sans-serif",fontSize:"11px",color:"#e05555",marginBottom:"6px"}}>{promoErr}</p>}
                  {promo && <p style={{fontFamily:"sans-serif",fontSize:"11px",color:"#3a7a3a",marginBottom:"4px"}}>✅ <strong>{promo.code}</strong> — {promo.label}</p>}

  /* ── ANIMATED COUNTER ── */
  function Counter({end, suffix=""}) {
    const [val,setVal]=useState(0);
    const ref=useRef(null);
    const started=useRef(false);
    useEffect(()=>{
      const obs=new IntersectionObserver(([entry])=>{
        if(entry.isIntersecting && !started.current){
          started.current=true;
          const duration=1400, steps=40, inc=end/steps;
          let cur=0,i=0;
          const t=setInterval(()=>{ i++; cur+=inc; setVal(i>=steps?end:Math.round(cur)); if(i>=steps) clearInterval(t); },duration/steps);
        }
      },{threshold:0.4});
      if(ref.current) obs.observe(ref.current);
      return ()=>obs.disconnect();
    },[]);
    return <div ref={ref}>{val}{suffix}</div>;
  }

                <div style={{fontFamily:"sans-serif",fontSize:"11px",color:"#aaa",marginTop:"8px"}}>📍 {o.address} · {o.pay_label}</div>
                {o.status!=="delivered" && (
                  <button onClick={()=>markDelivered(o.id)} style={{marginTop:"14px",padding:"10px 24px",background:MID,color:"#fff",border:"none",letterSpacing:"2px",fontSize:"10px",fontFamily:"sans-serif",fontWeight:"700",textTransform:"uppercase",cursor:"pointer"}}>Mark Delivered</button>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  /* ── MAIN APP ── */
  function RahulFoods() {
    const [page,setPage]         = useState("home");
    const [scrolled,setScrolled] = useState(false);
    const [cart,setCart]         = useState({});
    const [toast,setToast]       = useState(null);
    const [modalDish,setModalDish]= useState(null);
    const [user,setUser]         = useState(null);
    const [authMode,setAuthMode] = useState(null);
    const [darkMode,setDarkMode] = useState(false);
    const toastTimer = useRef(null);

    useEffect(()=>{
      const theme = localStorage.getItem("rf_theme");
      if(theme==="dark") setDarkMode(true);

      supabase.auth.getSession().then(({data:{session}})=>{
        if(session?.user) setUser({ id:session.user.id, name: session.user.user_metadata?.name || session.user.email.split("@")[0], email: session.user.email });
      });
      const { data: listener } = supabase.auth.onAuthStateChange((_event, session)=>{
        if(session?.user) setUser({ id:session.user.id, name: session.user.user_metadata?.name || session.user.email.split("@")[0], email: session.user.email });
        else setUser(null);
      });
      return ()=>listener.subscription.unsubscribe();
    },[]);

    useEffect(()=>{
      const root = document.getElementById("root");
      root.classList.toggle("dark-mode", darkMode);
      localStorage.setItem("rf_theme", darkMode?"dark":"light");
    },[darkMode]);

    const handleAuth = () => {
      setAuthMode(null);
      showToast(`Welcome!`);
    };

    const handleLogout = async () => {
      await supabase.auth.signOut();
      showToast("Signed out", "info");
    };

    useEffect(()=>{const fn=()=>setScrolled(window.scrollY>60);window.addEventListener("scroll",fn);return()=>window.removeEventListener("scroll",fn);},[]);
    useEffect(()=>{window.scrollTo({top:0});setScrolled(false);},[page]);

    const showToast = (msg, type="success") => {
      clearTimeout(toastTimer.current);
      setToast({msg,type});
      toastTimer.current = setTimeout(()=>setToast(null), 2800);
    };

    const addToCart = item => {
      setCart(c=>({...c,[item.name]:c[item.name]?{...c[item.name],qty:c[item.name].qty+1}:{item,qty:1}}));
      showToast(`${item.name.length>30?item.name.slice(0,28)+"…":item.name} added to cart!`);
    };

    const updateQty = (name, delta) => setCart(c=>{
      if(!c[name]) return c;
      const nq=c[name].qty+delta;
      if(nq<=0){const n={...c};delete n[name];return n;}
      return {...c,[name]:{...c[name],qty:nq}};
    });

    const clearCart = () => setCart({});

    const recordOrder = async (orderDetails) => {
      const count = (parseInt(localStorage.getItem("rf_orderCount"))||0) + 1;
      localStorage.setItem("rf_orderCount", count);
      if(!user) return;
      await supabase.from("orders").insert({
        user_id: user.id,
        items: orderDetails.items,
        total: orderDetails.total,
        pay_label: orderDetails.payLabel,
        address: orderDetails.address,
      });
    };

    const cartCount = Object.values(cart).reduce((s,{qty})=>s+qty,0);

    return (
      <div>
        <Navbar page={page} setPage={setPage} scrolled={scrolled} cartCount={cartCount} user={user} onOpenAuth={setAuthMode} onLogout={handleLogout} />
        <div key={page} className="page-animate">
          {page==="home"    && <HomePage    setPage={setPage} cart={cart} addToCart={addToCart} updateQty={updateQty} onOpenModal={setModalDish} user={user} />}
          {page==="menu"    && <MenuPage    setPage={setPage} cart={cart} addToCart={addToCart} updateQty={updateQty} onOpenModal={setModalDish} />}
          {page==="cart"    && <CartPage    setPage={setPage} cart={cart} updateQty={updateQty} showToast={showToast} clearCart={clearCart} onOrderPlaced={recordOrder} />}
          {page==="gallery" && <GalleryPage />}
          {page==="about"   && <AboutPage />}
          {page==="contact" && <ContactPage setPage={setPage} />}
          {page==="reserve" && <ReservePage setPage={setPage} />}
          {page==="orders"  && <MyOrdersPage user={user} setPage={setPage} />}
          {page==="admin"   && <AdminPage user={user} setPage={setPage} />}
        </div>
        <Footer setPage={setPage} />

        {/* Toast notification */}
        <Toast toast={toast} />

        {/* Dish detail modal */}
        {modalDish && <DishModal dish={modalDish} cart={cart} addToCart={addToCart} updateQty={updateQty} onClose={()=>setModalDish(null)} />}

        {/* Auth modal */}
        {authMode && <AuthModal mode={authMode} setMode={setAuthMode} onClose={()=>setAuthMode(null)} onAuth={handleAuth} />}

        {/* Sticky mobile reserve bar */}
        {page!=="reserve" && page!=="cart" && (
          <div className="sticky-reserve">
            <span style={{color:"#fff",fontFamily:"sans-serif",fontSize:"13px"}}>🍽️ Book your table now</span>
            <button onClick={()=>setPage("reserve")} style={{padding:"10px 22px",background:GOLD,color:"#fff",border:"none",letterSpacing:"2px",fontSize:"10px",fontFamily:"sans-serif",fontWeight:"700",textTransform:"uppercase",borderRadius:"3px"}}>Reserve</button>
          </div>
        )}

        {/* Dark mode toggle */}
        <button className="theme-toggle" onClick={()=>setDarkMode(d=>!d)} title="Toggle dark mode" aria-label="Toggle dark mode">
          {darkMode ? "☀️" : "🌙"}
        </button>

        {/* WhatsApp floating button */}
        <a href="https://wa.me/919876543210?text=Hello%21+I%27d+like+to+know+more+about+Rahul+Foods." target="_blank" rel="noopener noreferrer" className="whatsapp-btn" title="Chat with us on WhatsApp" aria-label="Chat with us on WhatsApp">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
            <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.528 5.845L0 24l6.335-1.506A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.37l-.36-.214-3.732.888.936-3.637-.235-.375A9.818 9.818 0 1112 21.818z"/>
          </svg>
        </a>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<RahulFoods />);
</script>
</body>
</html>
